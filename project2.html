<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximo Proyecto — Magdalena Soulier</title>
    <link rel="stylesheet" href="PortfolioStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        .case-study {
            padding-top: var(--header-h);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .cs-coming-soon {
            height: auto;
            flex: 1;
            align-items: center;
        }

        .cs-coming-inner {
            grid-column: 1 / 13;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            min-height: 70vh;
            padding-left: 30px;
            gap: 20px;
        }

        .cs-coming-label {
            font-family: "Space Mono", monospace;
            font-size: 0.85rem;
            color: var(--brand-orange);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .cs-coming-title {
            font-family: "Space Mono", monospace;
            font-size: clamp(2.5rem, 6vw, 6rem);
            font-weight: 700;
            color: var(--brand-orange);
            text-transform: uppercase;
            line-height: 0.88;
            letter-spacing: -0.02em;
        }

        /* ---- Footer ---- */
        .cs-footer {
            border-top: 2px solid var(--brand-orange);
            background: var(--bg-gray);
        }

        .cs-footer-inner {
            height: auto;
            padding: 20px 0 30px;
            align-items: center;
        }

        .cs-footer-inicio {
            grid-column: 1 / 4;
            font-family: "Space Mono", monospace;
            font-size: 0.85rem;
            color: var(--brand-orange);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-left: 30px;
        }

        .cs-footer-credits {
            grid-column: 8 / 13;
            font-family: "Space Mono", monospace;
            font-size: 0.7rem;
            color: var(--brand-orange);
            text-transform: uppercase;
            text-align: right;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .cs-coming-inner {
                padding-left: 0;
                min-height: 60vh;
            }
            .cs-footer-inicio {
                grid-column: 1 / 5;
                padding-left: 0;
            }
            .cs-footer-credits {
                grid-column: 1 / 7;
                grid-row: 2;
                text-align: left;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="grid-layout">
            <div class="h-item h-item-1">
                <a href="index.html" class="flower" id="logo-inicio">
                    <svg viewBox="0 0 712 681" xmlns="http://www.w3.org/2000/svg">
                        <path id="HeaderCentro"
                            d="M355.56,164.2L485.67,215.79L539.56,340.33L485.67,464.87L355.56,516.45L225.44,464.87L171.55,340.33L225.44,215.79L355.56,164.2Z"
                            fill="var(--brand-orange)" />
                        <g id="HeaderCorona">
                            <path d="M231.12,367.36L98.62,423.1L0,423.1L0,256.84L98.62,256.84L231.12,313.31C234.39,298.21 240.34,284.09 248.45,271.5L109.48,220.47L41.23,155.15L162.46,39.11L230.71,104.43L283.28,235.53C295.82,226.86 309.98,220.39 325.22,216.66L269.08,94.4L269.08,0L442.78,0L442.78,94.4L385.9,216.66C401.31,220.43 415.62,227.01 428.26,235.83L480.78,104.79L549.02,39.47L670.25,155.51L602.01,220.83L462.93,271.93C470.9,284.41 476.76,298.37 479.99,313.3L612.49,257.56L711.11,257.56L711.11,423.82L612.49,423.82L479.99,367.35C476.72,382.45 470.77,396.56 462.66,409.15L601.63,460.19L669.88,525.51L548.65,641.55L480.4,576.23L427.83,445.13C415.29,453.8 401.13,460.27 385.89,464L442.03,586.26L442.03,680.66L268.33,680.66L268.33,586.26L325.21,464C309.8,460.22 295.49,453.64 282.85,444.83L230.33,575.87L162.09,641.19L40.86,525.15L109.1,459.83L248.18,408.73C240.21,396.25 234.35,382.29 231.12,367.36Z"
                                fill="var(--brand-orange)" />
                        </g>
                        <g id="HeaderOjo">
                            <g id="HeaderParpado">
                                <path d="M218.63,340.33L305.11,257.56L407.02,257.56L492.48,339.36L493.49,339.36L492.99,339.84L493.49,340.33L492.48,340.33L406.01,423.1L304.09,423.1L218.63,341.3L217.62,341.3L218.12,340.81L217.62,340.33L218.63,340.33Z"
                                    fill="#f2f2f2"/>
                            </g>
                        </g>
                        <g id="HeaderIris">
                            <ellipse cx="355.56" cy="341.48" rx="43.74" ry="41.87" fill="var(--brand-orange)" />
                        </g>
                    </svg>
                </a>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </header>


    <section class="case-study">

        <div class="grid-layout cs-coming-soon">
            <div class="cs-coming-inner">
                <span class="cs-coming-label">Próximamente</span>
                <h1 class="cs-coming-title">NUEVO<br>PROYECTO</h1>
            </div>
        </div>

    </section>


    <div class="cs-footer">
        <div class="grid-layout cs-footer-inner">
            <a href="project1.html" class="cs-footer-inicio">← TU BARRIO, TU FERIA</a>
            <div class="cs-footer-credits">
                DISEÑO Y DESARROLLO POR MAGDALENA SOULIER<br>© 2026
            </div>
        </div>
    </div>


    <div class="custom-cursor">
        <div class="cursor-dot"></div>
    </div>


    <script>
        const cursor = document.querySelector('.custom-cursor');

        document.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top  = e.clientY + 'px';
            });
        });
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.7)';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        document.querySelector('.cs-footer-inicio').addEventListener('mouseenter', () => {
            cursor.classList.add('cursor-pointer');
        });
        document.querySelector('.cs-footer-inicio').addEventListener('mouseleave', () => {
            cursor.classList.remove('cursor-pointer');
        });
    </script>


</body>
</html>
